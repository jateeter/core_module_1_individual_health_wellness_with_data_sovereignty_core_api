---
validate_health_data_inputs:
  description: Create comprehensive validation patterns for {patient_name}'s health
    data inputs based on Apple HealthKit standards. Develop validation rules for vital
    signs (blood pressure, heart rate, temperature, respiratory rate), body measurements
    (height, weight, BMI, body fat percentage), activity metrics (steps, distance,
    calories, exercise duration), sleep data (duration, efficiency, stages), and lab
    values (glucose, cholesterol, HbA1c). Establish data format requirements, acceptable
    value ranges, unit conversions, and error handling protocols. Create structured
    validation schemas that ensure clinical accuracy and data integrity while supporting
    interoperability with Apple Health ecosystem.
  expected_output: 'A complete health data validation framework including: validation
    patterns for all Apple HealthKit data types, acceptable value ranges with clinical
    justification, data format specifications (JSON schemas), unit conversion tables,
    error handling protocols, and structured validation rules ready for implementation
    in the wellness automation system.'
  agent: health_data_validation_specialist
map_community_health_resources_and_services:
  description: Create comprehensive mapping of community health resources and services
    in {community_name} including healthcare facilities, social services, wellness
    programs, transportation options, food resources, mental health services, addiction
    support, and community support organizations. Assess accessibility, quality, and
    gaps in services. Develop resource directories and navigation tools that help
    community members access available health and wellness support. Coordinate with
    service providers to improve service integration and reduce barriers.
  expected_output: 'Complete community health resource map including: comprehensive
    service directory, accessibility analysis, service gap identification, resource
    navigation tools, provider coordination protocols, community resource database,
    service integration recommendations, and accessible resource guides for community
    members with contact information and eligibility requirements.'
  agent: community_health_resource_coordinator
  async_execution: true
pii_ephi_data_segregation_and_obfuscation:
  description: 'Implement comprehensive data segregation protocols for {patient_name}''s
    wellness information, distinguishing between PII, ePHI, and non-sensitive data.
    Create HIPAA-compliant identity obfuscation systems using advanced techniques
    including: tokenization of patient identifiers, pseudonymization of health records,
    encryption of sensitive attributes, de-identification of clinical data, and anonymization
    of research datasets. Establish separate data repositories for different sensitivity
    levels, implement access controls based on minimum necessary principles, and create
    audit trails for all data access. Ensure all ePHI elements (names, addresses,
    birth dates, SSN, medical record numbers, health plan numbers, biometric data,
    photographs, and any other identifying information) are properly protected through
    technical, administrative, and physical safeguards.'
  expected_output: 'A complete data segregation framework including: PII/ePHI classification
    schema, identity obfuscation protocols with tokenization keys, segregated data
    storage architecture, access control matrices, audit logging specifications, de-identification
    procedures, and HIPAA-compliant data handling workflows ready for implementation
    in the wellness automation system.'
  agent: healthcare_compliance_auditor
  context:
  - validate_health_data_inputs
establish_peer_support_networks_and_wellness_circles:
  description: Design and implement peer support networks for {community_name} by
    creating health-focused support groups, training community members as peer health
    coaches, establishing wellness circles for shared health experiences, and facilitating
    connections between individuals with similar health journeys. Develop peer support
    training curriculum, create safe spaces for health sharing, establish group guidelines
    that maintain privacy and respect, and create systems for ongoing peer support
    coordination and quality assurance.
  expected_output: 'Comprehensive peer support network including: peer support group
    structure, peer health coach training program, wellness circle facilitation guides,
    support group meeting frameworks, peer connection protocols, privacy and safety
    guidelines, peer coach certification system, ongoing support coordination systems,
    and community wellness circle sustainability plans.'
  agent: peer_support_network_coordinator
  context:
  - map_community_health_resources_and_services
annual_hipaa_compliance_certification_audit:
  description: Conduct comprehensive annual HIPAA compliance audit for {patient_name}'s
    wellness automation system, evaluating all aspects of the HIPAA Security Rule,
    Privacy Rule, and Breach Notification Rule. Assess administrative safeguards (security
    officer designation, workforce training, access management, risk assessments),
    physical safeguards (facility access controls, workstation use, device controls,
    media controls), and technical safeguards (access control, audit controls, integrity,
    transmission security, encryption). Review Business Associate Agreements (BAAs),
    conduct risk assessments, evaluate incident response procedures, assess breach
    notification protocols, and verify compliance with minimum necessary standards.
    Document all findings, create remediation plans for any gaps, and prepare certification
    materials for regulatory review.
  expected_output: 'Complete HIPAA compliance certification package including: compliance
    assessment matrix, risk assessment report, safeguards implementation status, BAA
    compliance verification, audit findings summary, remediation action plans, compliance
    training records, incident response documentation, and formal HIPAA certification
    attestation ready for regulatory submission.'
  agent: healthcare_compliance_auditor
  context:
  - pii_ephi_data_segregation_and_obfuscation
configure_apple_health_device_ecosystem:
  description: 'Establish comprehensive Apple Health device integration for {patient_name}
