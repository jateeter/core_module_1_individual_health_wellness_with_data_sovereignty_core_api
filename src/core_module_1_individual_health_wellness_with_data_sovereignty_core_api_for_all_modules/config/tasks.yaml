    record of processing activities, and assess Data Protection Officer (DPO) functions.
    Document compliance with accountability principle, transparency requirements,
    and data minimization practices.
  expected_output: 'Complete GDPR compliance certification package including: lawful
    basis documentation, data subject rights procedures, DPIA reports, consent management
    protocols, breach notification procedures, international transfer assessments,
    privacy policy reviews, record of processing activities, accountability documentation,
    and formal GDPR compliance attestation ready for supervisory authority review.'
